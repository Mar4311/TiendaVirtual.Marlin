<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ShopMaster | Tienda Pro</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* Personalización visual */
        :root {
            --primario: #007BFF;
            --secundario: #28A745;
            --oscuro: #343A40;
        }

        body { 
            font-family: 'Roboto', sans-serif; 
            background-color: #f4f7f6; 
            color: var(--oscuro);
        }

        /* Diseño de Tarjetas de Producto */
        .card {
            border: none;
            border-radius: 15px;
            transition: transform 0.3s, box-shadow 0.3s;
            cursor: pointer;
        }

        .card:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
        }

        .product-img {
            height: 200px;
            object-fit: contain;
            padding: 15px;
            background: white;
            border-radius: 15px 15px 0 0;
        }

        /* Estilo del Carrito Floating */
        .cart-badge {
            position: absolute;
            top: -5px;
            right: -10px;
            border-radius: 50%;
        }

        /* Modal y Checkout */
        .modal-header { background-color: var(--primario); color: white; }
        .img-detalle { max-height: 350px; object-fit: contain; width: 100%; }
    </style>
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top shadow">
        <div class="container">
            <a class="navbar-brand fw-bold" href="#">🛒 ShopMaster</a>
            <button class="btn btn-light position-relative" data-bs-toggle="modal" data-bs-target="#modalCarrito">
                <i class="fas fa-shopping-cart"></i>
                <span id="cart-count" class="badge bg-danger cart-badge">0</span>
            </button>
        </div>
    </nav>

    <div class="container my-5">
        <header class="text-center mb-5">
            <h1 class="display-4 fw-bold">Explora Productos Reales</h1>
            <p class="lead">Conectado a FakeStore API en tiempo real</p>
        </header>

        <div id="productos-grid" class="row row-cols-1 row-cols-md-2 row-cols-lg-4 g-4">
            <div class="text-center w-100">
                <div class="spinner-border text-primary" role="status"></div>
                <p>Cargando catálogo...</p>
            </div>
        </div>
    </div>

    <div class="modal fade" id="modalProducto" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content" id="detalle-render">
                </div>
        </div>
    </div>

    <div class="modal fade" id="modalCarrito" tabindex="-1" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">Tu Pedido 🛍️</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="lista-carrito" class="mb-3">
                        </div>
                    <div id="checkout-form" style="display: none;" class="border-top pt-3">
                        <h6>Datos de Pago 💳</h6>
                        <input type="text" id="nombre-cliente" class="form-control mb-2" placeholder="Nombre completo">
                        <input type="text" id="tarjeta" class="form-control mb-2" placeholder="0000 0000 0000 0000">
                        <div class="row">
                            <div class="col"><input type="text" class="form-control" placeholder="MM/AA"></div>
                            <div class="col"><input type="text" class="form-control" placeholder="CVV"></div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer flex-column">
                    <div class="d-flex justify-content-between w-100 mb-2">
                        <strong>Total:</strong>
                        <strong id="total-precio" class="text-success">$0.00</strong>
                    </div>
                    <button id="btn-pagar-view" class="btn btn-success w-100" onclick="mostrarSeccionPago()">Proceder al Pago ✅</button>
                    <button id="btn-confirmar-final" class="btn btn-primary w-100" style="display: none;" onclick="procesarCompra()">Confirmar y Descargar Ticket 📄</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

    <script>
        let carrito = [];
        const grid = document.getElementById('productos-grid');

        // 1. Obtener productos de la API
        async function fetchProducts() {
            try {
                const response = await fetch('https://fakestoreapi.com/products');
                const products = await response.json();
                renderProducts(products);
            } catch (error) {
                grid.innerHTML = `<p class="text-danger">Error al conectar con la tienda.</p>`;
            }
        }

        // 2. Pintar productos en pantalla
        function renderProducts(products) {
            grid.innerHTML = '';
            products.forEach(p => {
                grid.innerHTML += `
                    <div class="col">
                        <div class="card h-100 shadow-sm">
                            <img src="${p.image}" class="card-img-top product-img" alt="${p.title}">
                            <div class="card-body d-flex flex-column">
                                <h6 class="card-title fw-bold">${p.title.substring(0, 30)}...</h6>
                                <p class="card-text text-muted small">${p.category}</p>
                                <h5 class="text-primary mt-auto">$${p.price.toFixed(2)}</h5>
                                <button class="btn btn-outline-primary btn-sm mt-2" onclick="verDetalle(${p.id})">
                                    Ver detalles <i class="fas fa-eye"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            });
        }

        // 3. Ver detalle en Modal
        async function verDetalle(id) {
            const res = await fetch(`https://fakestoreapi.com/products/${id}`);
            const p = await res.json();
            
            document.getElementById('detalle-render').innerHTML = `
                <div class="modal-header">
                    <h5 class="modal-title">${p.title}</h5>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row align-items-center">
                        <div class="col-md-5 text-center">
                            <img src="${p.image}" class="img-fluid img-detalle mb-3">
                        </div>
                        <div class="col-md-7">
                            <span class="badge bg-info mb-2">${p.category}</span>
                            <p class="text-dark">${p.description}</p>
                            <h3 class="text-success fw-bold">$${p.price.toFixed(2)}</h3>
                            <div class="d-flex gap-2">
                                <input type="number" id="qty-${p.id}" class="form-control w-25" value="1" min="1">
                                <button class="btn btn-success flex-grow-1" onclick="agregarAlCarrito(${p.id}, '${p.title.replace(/'/g, "")}', ${p.price})">
                                    Añadir al Carrito <i class="fas fa-cart-plus"></i>
                                </button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            const myModal = new bootstrap.Modal(document.getElementById('modalProducto'));
            myModal.show();
        }

        // 4. Lógica del Carrito
        function agregarAlCarrito(id, titulo, precio) {
            const qty = parseInt(document.getElementById(`qty-${id}`).value);
            const itemExistente = carrito.find(item => item.id === id);

            if (itemExistente) {
                itemExistente.cantidad += qty;
            } else {
                carrito.push({ id, titulo, precio, cantidad: qty });
            }
            
            actualizarUI();
            bootstrap.Modal.getInstance(document.getElementById('modalProducto')).hide();
        }

        function actualizarUI() {
            const count = carrito.reduce((acc, item) => acc + item.cantidad, 0);
            document.getElementById('cart-count').innerText = count;

            const lista = document.getElementById('lista-carrito');
            let total = 0;
            
            if (carrito.length === 0) {
                lista.innerHTML = `<p class="text-center">El carrito está vacío 💨</p>`;
            } else {
                lista.innerHTML = carrito.map((item, index) => {
                    total += item.precio * item.cantidad;
                    return `
                        <div class="d-flex justify-content-between align-items-center mb-2 border-bottom pb-2">
                            <div>
                                <small class="d-block fw-bold">${item.titulo.substring(0,25)}...</small>
                                <small>Cant: ${item.cantidad} x $${item.precio}</small>
                            </div>
                            <button class="btn btn-sm btn-danger" onclick="eliminarDelCarrito(${index})"><i class="fas fa-trash"></i></button>
                        </div>
                    `;
                }).join('');
            }
            document.getElementById('total-precio').innerText = `$${total.toFixed(2)}`;
        }

        function eliminarDelCarrito(index) {
            carrito.splice(index, 1);
            actualizarUI();
        }

        // 5. Simulación de Pago y Ticket
        function mostrarSeccionPago() {
            if(carrito.length === 0) return alert("Añade productos primero");
            document.getElementById('checkout-form').style.display = 'block';
            document.getElementById('btn-pagar-view').style.display = 'none';
            document.getElementById('btn-confirmar-final').style.display = 'block';
        }

        function procesarCompra() {
            const nombre = document.getElementById('nombre-cliente').value;
            if(!nombre) return alert("Por favor, ingresa tu nombre");

            generarPDF(nombre);
            alert("¡Pago exitoso! Descargando tu comprobante...");
            
            // Resetear
            carrito = [];
            actualizarUI();
            location.reload();
        }

        function generarPDF(cliente) {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF({ unit: 'mm', format: [80, 160] }); // Formato térmico
            
            doc.setFont("courier", "bold");
            doc.setFontSize(10);
            doc.text("SHOPMASTER S.A.", 40, 10, { align: "center" });
            doc.setFont("courier", "normal");
            doc.text("--------------------------------", 40, 15, { align: "center" });
            doc.text(`Cliente: ${cliente}`, 5, 22);
            doc.text(`Fecha: ${new Date().toLocaleString()}`, 5, 28);
            doc.text("--------------------------------", 40, 33, { align: "center" });

            let y = 40;
            let totalFinal = 0;

            carrito.forEach(item => {
                const subtotal = item.precio * item.cantidad;
                totalFinal += subtotal;
                doc.text(`${item.cantidad} x ${item.titulo.substring(0,15)}`, 5, y);
                doc.text(`$${subtotal.toFixed(2)}`, 75, y, { align: "right" });
                y += 6;
            });

            doc.text("--------------------------------", 40, y + 2, { align: "center" });
            doc.setFont("courier", "bold");
            doc.text(`TOTAL A PAGAR: $${totalFinal.toFixed(2)}`, 5, y + 10);
            doc.text("¡GRACIAS POR SU COMPRA!", 40, y + 20, { align: "center" });

            doc.save(`Ticket_ShopMaster_${Date.now()}.pdf`);
        }

        // Iniciar app
        fetchProducts();
    </script>
</body>
</html>
